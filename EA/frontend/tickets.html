<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inbox & Tickets — CompanyZ</title>
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="brand">
        <img class="logo" src="/ui/logo.jpeg" alt="CompanyZ logo" />
        <span>CompanyZ</span>
      </div>
      <div class="links">
        <a href="/ui" id="nav-manual">Manual Test</a>
        <a href="/ui/tickets.html" id="nav-tickets">Inbox & Tickets</a>
        <a href="/ui/dashboard.html" id="nav-dashboard">Dashboard</a>
        <a href="/ui/admin-login.html" id="nav-login">Sign In</a>
        <button id="nav-logout" class="linklike hidden" type="button">Sign Out</button>
      </div>
    </nav>

    <div class="container">
      <header>
        <h1>Inbox & Tickets</h1>
        <p class="muted">Mailbox: <span id="mailbox">loading…</span></p>
      </header>

      <main>
        <section class="panel gated hidden">
          <div class="row" style="justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <button id="refresh-tickets-btn" type="button">Refresh Tickets</button>
            <div style="display: flex; align-items: center; gap: 12px;">
              <label style="margin: 0; font-weight: 500;">Show:</label>
              <select id="tickets-limit" style="padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 14px;">
                <option value="10">10</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="500">500</option>
              </select>
              <span id="tickets-count" class="muted" style="font-size: 14px;"></span>
            </div>
          </div>
          <div>
            <table class="table" id="tickets-table">
              <thead>
                <tr>
                  <th>Ticket ID</th>
                  <th>From</th>
                  <th>To</th>
                  <th>Subject</th>
                  <th>Date</th>
                  <th>Agent</th>
                  <th>Intent</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="tickets-body">
                <tr><td colspan="8" class="muted">Loading…</td></tr>
              </tbody>
            </table>
          </div>

          <h3>Conversation</h3>
          <div id="conversation" class="conversation"></div>
        </section>
      </main>
    </div>

    <script src="/ui/tickets.js"></script>
  </body>
  </html>
